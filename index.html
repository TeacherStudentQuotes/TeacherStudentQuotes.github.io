<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名言</title>
<meta id="ogDesc" property="og:description" content="教师名言录">
<meta id="metaDesc" name="description" content="教师名言录">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@font-face {
  font-family: 'Computer Modern';
  src: url('cmu.serif-roman.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* STZhongsong 字体由 JS 手动加载以显示进度 */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
}

body {
  background: #f5f0e8;
  font-family: 'STZhongsong', "SimSun", "宋体", serif;
  overflow: hidden;
}

/* ===== 列表视图 ===== */
.list-view {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.list-header {
  padding: 24px 40px 16px;
  border-bottom: 1px solid #ddd8ce;
  flex-shrink: 0;
  background: #f5f0e8;
  z-index: 10;
}

.list-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.list-header h1 {
  font-size: 2rem;
  color: #333;
  letter-spacing: 0.15em;
}

.list-header p {
  margin-top: 6px;
  font-size: 0.9rem;
  color: #888;
}

.filter-wrap {
  position: relative;
}

.filter-btn {
  width: 36px;
  height: 36px;
  border: 1px solid #ccc;
  background: #fffef8;
  color: #555;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
}

.filter-btn:hover {
  background: #eee;
}

.filter-dropdown {
  position: absolute;
  top: 44px;
  right: 0;
  min-width: 140px;
  max-height: 300px;
  overflow-y: auto;
  overscroll-behavior-y: none;
  background: #fffef8;
  border: 1px solid #ddd8ce;
  border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  display: none;
  z-index: 50;
}

.filter-dropdown.show {
  display: block;
}

.filter-option {
  padding: 8px 14px;
  font-size: 0.9rem;
  color: #333;
  cursor: pointer;
  border-bottom: 1px solid #f0ece3;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.filter-option:last-child {
  border-bottom: none;
}

.filter-option:hover {
  background: #f5f0e8;
}

.filter-option.active {
  background: #e8e3d9;
  font-weight: bold;
}

.filter-option-count {
  font-size: 0.8rem;
  color: #999;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  margin-left: 8px;
}

.list-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 40px 40px;
}

.list-item {
  padding: 14px 18px;
  margin-bottom: 10px;
  background: #fffef8;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: baseline;
  gap: 14px;
  border: 1px solid #e8e3d9;
}

.list-item:hover {
  background: #faf7ef;
  transform: translateX(4px);
  border-color: #d5cfc4;
}

.list-item-index {
  font-size: 1rem;
  color: #666;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  min-width: 42px;
  text-align: right;
  flex-shrink: 0;
  align-self: baseline;
}

.list-item-content {
  flex: 1;
  font-size: 1rem;
  color: #333;
  line-height: 1.6;
}

.list-item-author {
  font-size: 0.85rem;
  color: #888;
  flex-shrink: 0;
}

/* ===== 名言单页视图 ===== */
.quote-view {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  position: relative;
  display: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.quote-view.show {
  display: block;
}

.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #fffef8;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.quote-mark {
  position: absolute;
  font-size: 8rem;
  color: #ddd;
  font-family: 'STZhongsong', Georgia, serif;
  line-height: 1;
  user-select: none;
  z-index: 0;
}

.quote-mark.top-left {
  top: 30px;
  left: 40px;
}

.quote-mark.bottom-right {
  bottom: 30px;
  right: 40px;
}

.quote-content {
  font-size: 1.8rem;
  line-height: 2;
  text-align: center;
  color: #333;
  max-width: 90%;
  z-index: 2;
  transition: opacity 0.3s ease;
}

.quote-author {
  position: absolute;
  bottom: 80px;
  right: 80px;
  font-size: 1.3rem;
  color: #666;
  font-style: italic;
  transition: opacity 0.3s ease;
  z-index: 5;
}

.quote-author::before {
  content: "—— ";
}

.page-jump {
  position: fixed;
  bottom: 0;
  right: 0;
  z-index: 20;
}

.page-jump .page-number {
  width: 60px;
  height: 36px;
  background: #2c2c2c;
  color: #f5f0e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  cursor: pointer;
  user-select: none;
}

.page-jump input {
  width: 60px;
  height: 36px;
  background: #2c2c2c;
  color: #f5f0e8;
  border: none;
  text-align: center;
  font-size: 0.9rem;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  outline: none;
}

.page-jump input::placeholder {
  color: #999;
}

.back-btn {
  position: fixed;
  top: 16px;
  right: 20px;
  padding: 6px 16px;
  border: 1px solid #ccc;
  background: #fffef8;
  color: #333;
  font-family: inherit;
  font-size: 0.9rem;
  border-radius: 4px;
  cursor: pointer;
  z-index: 200;
}

.back-btn:hover {
  background: #eee;
}

.click-zone {
  position: fixed;
  top: 0;
  width: 30%;
  height: 100%;
  cursor: pointer;
  z-index: 100;
}

.click-zone.left { left: 0; }
.click-zone.right { right: 0; }



@media (max-width: 600px) {
  .list-header { padding: 16px 20px 12px; }
  .list-header h1 { font-size: 1.5rem; }
  .list-body { padding: 12px 20px 20px; }
  .list-item-content { white-space: normal; }
  .page {
    padding: 80px 28px 100px;
    height: auto;
    min-height: 100%;
    justify-content: center;
  }
  .quote-content { font-size: 1.2rem; line-height: 1.7; max-width: 100%; }
  .quote-author { font-size: 1rem; bottom: 70px; right: 24px; }
  .quote-mark { font-size: 5.5rem; }
  .quote-mark.top-left { top: 24px; left: 24px; }
  .quote-mark.bottom-right { bottom: 24px; right: 24px; }
  .page-jump { bottom: 0; right: 0; }
  .page-jump .page-number, .page-jump input { width: 48px; height: 32px; font-size: 0.85rem; }
}
.loading-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #f5f0e8;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  transition: opacity 0.4s ease;
}

.loading-overlay.hide {
  opacity: 0;
  pointer-events: none;
}

.spinner-wrap {
  position: relative;
  width: 64px;
  height: 64px;
}

.spinner {
  width: 100%;
  height: 100%;
  border: 4px solid #ddd;
  border-top-color: #333;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.progress-num {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.85rem;
  color: #333;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  z-index: 2;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <div class="progress-num" id="progressNum">0</div>
  </div>
</div>

<!-- 列表视图 -->
<div class="list-view" id="listView">
  <div class="list-header">
    <div>
      <h1>名言</h1>
      <p>教师名言录，共 <span id="totalCount">0</span> 条</p>
    </div>
    <div class="filter-wrap">
      <button class="filter-btn" onclick="toggleFilter()" title="筛选作者"><i class="fas fa-filter"></i></button>
      <div class="filter-dropdown" id="filterDropdown"></div>
    </div>
  </div>
  <div class="list-body" id="listBody"></div>
</div>

<!-- 名言单页视图 -->
<div class="quote-view" id="quoteView">
  <button class="back-btn" onclick="showList()">返回列表</button>
  <div class="click-zone left" onclick="prevPage()"></div>
  <div class="click-zone right" onclick="nextPage()"></div>
  <div class="page">
    <div class="quote-mark top-left">“</div>
    <div class="quote-content" id="qContent"></div>
    <div class="quote-author" id="qAuthor"></div>
    <div class="quote-mark bottom-right">”</div>
    <div class="page-jump" id="pageJump">
      <div class="page-number" id="pageNum" onclick="startJump()"></div>
    </div>
  </div>
</div>

<script src="quotes.js"></script>
<script>
let current = 0;
const total = quotes.length + 1;

const listView = document.getElementById('listView');
const quoteView = document.getElementById('quoteView');

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

let allItems = [];
let currentFilter = '全部';

function createList() {
  document.getElementById('totalCount').textContent = quotes.length;
  const listBody = document.getElementById('listBody');
  allItems = [];
  quotes.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.dataset.author = q.author;
    item.onclick = () => showQuote(i + 1);
    const preview = q.content;
    item.innerHTML = `
      <span class="list-item-index">${i + 1}</span>
      <span class="list-item-content">${escapeHtml(preview)}</span>
      <span class="list-item-author">${escapeHtml(q.author)}</span>
    `;
    listBody.appendChild(item);
    allItems.push(item);
  });
  createFilter();
}

function createFilter() {
  const dropdown = document.getElementById('filterDropdown');
  dropdown.innerHTML = '';
  const authorCounts = {};
  quotes.forEach(q => {
    authorCounts[q.author] = (authorCounts[q.author] || 0) + 1;
  });
  const sortedAuthors = Object.entries(authorCounts)
    .sort((a, b) => b[1] - a[1])
    .map(entry => entry[0]);
  const authors = ['全部', ...sortedAuthors];
  authors.forEach(author => {
    const div = document.createElement('div');
    div.className = 'filter-option' + (author === currentFilter ? ' active' : '');
    const count = author === '全部' ? quotes.length : (authorCounts[author] || 0);
    div.innerHTML = `<span>${escapeHtml(author)}</span><span class="filter-option-count">${count}</span>`;
    div.onclick = (e) => {
      e.stopPropagation();
      applyFilter(author);
    };
    dropdown.appendChild(div);
  });
}

function toggleFilter() {
  const dropdown = document.getElementById('filterDropdown');
  dropdown.classList.toggle('show');
}

function applyFilter(author) {
  currentFilter = author;
  allItems.forEach(item => {
    if (author === '全部' || item.dataset.author === author) {
      item.style.display = 'flex';
    } else {
      item.style.display = 'none';
    }
  });
  createFilter();
  toggleFilter();
}

document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.filter-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('filterDropdown').classList.remove('show');
  }
});

function renderQuote(index) {
  const q = quotes[index - 1];
  const contentEl = document.getElementById('qContent');
  const authorEl = document.getElementById('qAuthor');
  const numEl = document.getElementById('pageNum');

  contentEl.style.opacity = '0';
  authorEl.style.opacity = '0';

  setTimeout(() => {
    contentEl.innerHTML = escapeHtml(q.content);
    authorEl.innerHTML = escapeHtml(q.author);
    numEl.textContent = index;
    contentEl.style.opacity = '1';
    authorEl.style.opacity = '1';
  }, 150);
}

function showList() {
  listView.style.display = 'flex';
  quoteView.classList.remove('show');
  document.title = '名言';
  document.getElementById('ogDesc').setAttribute('content', '教师名言录，共144条名言');
  document.getElementById('metaDesc').setAttribute('content', '教师名言录，共144条名言');
  history.replaceState(null, '', location.pathname + location.search);
}

function showQuote(index) {
  if (index < 1 || index >= total) return;
  current = index;
  listView.style.display = 'none';
  quoteView.classList.add('show');
  renderQuote(index);
  const q = quotes[index - 1];
  const preview = q.content.length > 20 ? q.content.slice(0, 20) + '...' : q.content;
  document.title = `名言 #${index} — ${q.author}：${preview}`;
  document.getElementById('ogDesc').setAttribute('content', `${q.author}：${q.content}`);
  document.getElementById('metaDesc').setAttribute('content', `${q.author}：${q.content}`);
  updateHash();
}

function nextPage() {
  if (current < total - 1) showQuote(current + 1);
}

function prevPage() {
  if (current > 1) showQuote(current - 1);
}

function startJump() {
  const container = document.getElementById('pageJump');
  const numEl = document.getElementById('pageNum');
  const val = numEl.textContent;
  container.innerHTML = `<input type="number" id="jumpInput" min="1" max="${quotes.length}" value="${val}" onblur="endJump()" onkeydown="if(event.key==='Enter')endJump()">`;
  const input = document.getElementById('jumpInput');
  input.focus();
  input.select();
}

function endJump() {
  const input = document.getElementById('jumpInput');
  const num = parseInt(input.value, 10);
  const container = document.getElementById('pageJump');
  container.innerHTML = `<div class="page-number" id="pageNum" onclick="startJump()"></div>`;
  document.getElementById('pageNum').textContent = current >= 1 ? current : '';
  if (!isNaN(num) && num >= 1 && num <= quotes.length) {
    showQuote(num);
  }
}

function updateHash() {
  history.replaceState(null, '', '#page=' + current);
}

function readHash() {
  const hash = location.hash;
  if (!hash) return 0;
  let num = 0;
  if (hash.startsWith('#page=')) {
    num = parseInt(hash.slice(6), 10);
  } else {
    num = parseInt(hash.slice(1), 10);
  }
  if (!isNaN(num) && num >= 1 && num < total) {
    return num;
  }
  return 0;
}

document.addEventListener('keydown', (e) => {
  if (!quoteView.classList.contains('show')) return;
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

async function getRealSize() {
  try {
    const res = await fetch('STZHONGS.TTF', { headers: { 'Range': 'bytes=0-0' } });
    if (res.status === 206) {
      const range = res.headers.get('Content-Range'); // bytes 0-0/12582912
      if (range) {
        const m = range.match(/\/(\d+)$/);
        if (m) return parseInt(m[1], 10);
      }
    }
  } catch (e) {}
  return 0;
}

async function loadFontWithProgress() {
  const progressNum = document.getElementById('progressNum');
  try {
    let total = await getRealSize();
    const response = await fetch('STZHONGS.TTF');
    if (!total) {
      total = parseInt(response.headers.get('Content-Length') || '0', 10);
    }
    const reader = response.body.getReader();
    const chunks = [];
    let loaded = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;
      if (total) {
        progressNum.textContent = Math.round((loaded / total) * 100);
      }
    }

    const allChunks = new Uint8Array(loaded);
    let pos = 0;
    for (const chunk of chunks) {
      allChunks.set(chunk, pos);
      pos += chunk.length;
    }

    const font = new FontFace('STZhongsong', allChunks.buffer);
    await font.load();
    document.fonts.add(font);
    progressNum.textContent = '100';
  } catch (err) {
    console.error('字体加载失败', err);
  } finally {
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hide');
    }, 200);
  }
}

loadFontWithProgress();

createList();

const initialPage = readHash();
if (initialPage > 0) {
  showQuote(initialPage);
}
</script>
</body>
</html>
