<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名言</title>

<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@font-face {
  font-family: 'Computer Modern';
  src: url('cmu.serif-roman.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}

/* STZhongsong 字体由 JS 手动加载以显示进度 */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* 隐藏所有滚动条 */
::-webkit-scrollbar { display: none; }
html, body, .list-body, .filter-dropdown, .quote-view {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

html, body {
  width: 100%;
  height: 100%;
}

body {
  background: #f5f0e8;
  font-family: 'STZhongsong', "SimSun", "宋体", serif;
  overflow: hidden;
}

/* ===== 列表视图 ===== */
.list-view {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.list-header {
  padding: 24px 40px 16px;
  border-bottom: 1px solid #ddd8ce;
  flex-shrink: 0;
  background: #f5f0e8;
  z-index: 10;
}

.list-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.list-header h1 {
  font-size: 2rem;
  color: #333;
  letter-spacing: 0.15em;
}

.list-header p {
  margin-top: 6px;
  font-size: 0.9rem;
  color: #888;
}

.filter-wrap {
  position: relative;
}

.search-wrap {
  position: relative;
}

.search-input {
  width: 180px;
  height: 36px;
  padding: 0 44px 0 32px;
  border: 1px solid #ccc;
  background: #fffef8;
  color: #333;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.95rem;
  outline: none;
}

.search-input:focus {
  border-color: #999;
}

.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: #999;
  font-size: 0.85rem;
  pointer-events: none;
}

.search-count {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem;
  color: #999;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  pointer-events: none;
}

.search-highlight {
  background: #ffe082;
  color: #333;
  border-radius: 2px;
  padding: 0 2px;
}

@media (max-width: 600px) {
  .search-input {
    width: 120px;
    font-size: 0.9rem;
  }
}

.filter-btn {
  width: 36px;
  height: 36px;
  border: 1px solid #ccc;
  background: #fffef8;
  color: #555;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
}

.filter-btn:hover {
  background: #eee;
}

.filter-dropdown {
  position: absolute;
  top: 44px;
  right: 0;
  min-width: 140px;
  max-height: 300px;
  overflow-y: auto;
  overscroll-behavior-y: none;
  background: #fffef8;
  border: 1px solid #ddd8ce;
  border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  display: none;
  z-index: 50;
}

.filter-dropdown.show {
  display: block;
}

.filter-option {
  padding: 8px 14px;
  font-size: 0.9rem;
  color: #333;
  cursor: pointer;
  border-bottom: 1px solid #f0ece3;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.filter-option:last-child {
  border-bottom: none;
}

.filter-option:hover {
  background: #f5f0e8;
}

.filter-option.active {
  background: #e8e3d9;
  font-weight: bold;
}

.filter-option-count {
  font-size: 0.8rem;
  color: #999;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  margin-left: 8px;
}

.list-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 40px 40px;
}

.list-item {
  padding: 14px 18px;
  margin-bottom: 10px;
  background: #fffef8;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  display: flex;
  align-items: baseline;
  gap: 14px;
  border: 1px solid #e8e3d9;
}

.list-item:hover {
  background: #faf7ef;
  transform: translateX(4px);
  border-color: #d5cfc4;
}

.list-item-index {
  font-size: 1rem;
  color: #666;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  min-width: 42px;
  text-align: right;
  flex-shrink: 0;
  align-self: baseline;
}

.list-item-content {
  flex: 1;
  font-size: 1rem;
  color: #333;
  line-height: 1.6;
}

ruby {
  ruby-align: center;
  line-height: 1;
}

rt {
  font-size: 0.65em;
  color: #888;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  line-height: 1.1;
}

/* 列表视图：悬停拼音 tooltip，始终不占空间 */
.pinyin-tip {
  position: relative;
  display: inline-block;
}

.pinyin-rt {
  position: absolute;
  bottom: calc(100% - 7px);
  left: 50%;
  transform: translateX(-50%);
  margin-bottom: 0;
  padding: 0;
  font-size: 0.75em;
  color: #888;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  white-space: nowrap;
  background: transparent;
  border: none;
  box-shadow: none;
  visibility: hidden;
  opacity: 0;
  transition: opacity 0.15s ease;
  z-index: 10;
  pointer-events: none;
}

.pinyin-tip:hover .pinyin-rt {
  visibility: visible;
  opacity: 1;
}

/* 单名言视图：拼音始终显示 */
.quote-content ruby rt {
  visibility: visible;
  opacity: 1;
}

.list-item {
  overflow: visible;
}

.list-item-author {
  font-size: 0.85rem;
  color: #888;
  flex-shrink: 0;
}

/* ===== 名言单页视图 ===== */
.quote-view {
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  position: relative;
  display: none;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.quote-view.show {
  display: block;
}

.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #fffef8;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.quote-mark {
  position: absolute;
  font-size: 8rem;
  color: #ddd;
  font-family: 'STZhongsong', Georgia, serif;
  line-height: 1;
  user-select: none;
  z-index: 0;
}

.quote-mark.top-left {
  top: 30px;
  left: 40px;
}

.quote-mark.bottom-right {
  bottom: 30px;
  right: 40px;
}

.quote-content {
  font-size: 1.8rem;
  line-height: 2.4;
  text-align: center;
  color: #333;
  max-width: 90%;
  z-index: 2;
  transition: opacity 0.3s ease;
}

.quote-author {
  position: absolute;
  bottom: 80px;
  right: 80px;
  font-size: 1.3rem;
  color: #666;
  font-style: italic;
  transition: opacity 0.3s ease;
  z-index: 5;
}

.quote-author::before {
  content: "—— ";
}

.page-jump {
  position: fixed;
  bottom: 0;
  right: 0;
  z-index: 20;
}

.page-jump .page-number {
  width: 60px;
  height: 36px;
  background: #2c2c2c;
  color: #f5f0e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  cursor: pointer;
  user-select: none;
}

.page-jump input {
  width: 60px;
  height: 36px;
  background: #2c2c2c;
  color: #f5f0e8;
  border: none;
  text-align: center;
  font-size: 0.9rem;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  outline: none;
}

.page-jump input::placeholder {
  color: #999;
}

.action-bar {
  position: fixed;
  top: 16px;
  right: 20px;
  display: flex;
  align-items: center;
  padding: 4px;
  border-radius: 999px;
  background: #fffef8;
  border: 1px solid #ccc;
  z-index: 200;
}

.action-bar button {
  width: 42px;
  height: 42px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: #555;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.action-bar button:hover {
  background: #eee;
}

.action-bar button:active {
  background: #e0e0e0;
}

@media (max-width: 600px) {
  .action-bar {
    top: 14px;
    right: 14px;
    padding: 3px;
  }
  .action-bar button {
    width: 40px;
    height: 40px;
    font-size: 0.95rem;
  }
}

.click-zone {
  position: fixed;
  top: 0;
  width: 30%;
  height: 100%;
  cursor: pointer;
  z-index: 100;
}

.click-zone.left { left: 0; }
.click-zone.right { right: 0; }



@media (max-width: 600px) {
  .list-header { padding: 16px 20px 12px; }
  .list-header h1 { font-size: 1.5rem; }
  .list-body { padding: 12px 20px 20px; }
  .list-item-content { white-space: normal; }
  .page {
    padding: 80px 28px 100px;
    height: auto;
    min-height: 100%;
    justify-content: center;
  }
  .quote-content { font-size: 1.2rem; line-height: 1.7; max-width: 100%; }
  .quote-author { font-size: 1rem; bottom: 70px; right: 24px; }
  .quote-mark { font-size: 5.5rem; }
  .quote-mark.top-left { top: 24px; left: 24px; }
  .quote-mark.bottom-right { bottom: 24px; right: 24px; }
  .page-jump { bottom: 0; right: 0; }
  .page-jump .page-number, .page-jump input { width: 48px; height: 32px; font-size: 0.85rem; }
}
.loading-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #f5f0e8;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  transition: opacity 0.4s ease;
}

.loading-overlay.hide {
  opacity: 0;
  pointer-events: none;
}

.spinner-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  transform: scale(2);
}

.spinner {
  width: 100%;
  height: 100%;
  animation: spin 1.5s linear infinite;
}

.spinner-bg {
  fill: none;
  stroke: #ddd;
  stroke-width: 6;
}

.spinner-progress {
  fill: none;
  stroke: #333;
  stroke-width: 6;
  transition: stroke-dashoffset 0.1s linear;
}

.progress-num {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.4rem;
  color: #333;
  font-family: 'Computer Modern', Cambria, Georgia, serif;
  z-index: 2;
}

.progress-decimal {
  font-size: 0.75rem;
  color: #888;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner-wrap">
    <svg class="spinner" viewBox="0 0 100 100">
      <circle class="spinner-bg" cx="50" cy="50" r="46"></circle>
      <circle class="spinner-progress" cx="50" cy="50" r="46" id="progressRing"></circle>
    </svg>
    <div class="progress-num" id="progressNum"><span id="progressInt">0</span><span class="progress-decimal" id="progressDecimal">.00%</span></div>
  </div>
</div>

<!-- 列表视图 -->
<div class="list-view" id="listView">
  <div class="list-header">
    <div>
      <h1>名言</h1>
      <p>师生名言“精选”，共 <span id="totalCount">0</span> 条</p>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="search-wrap">
        <input type="text" id="searchInput" class="search-input" placeholder="搜索..." oninput="applySearch()">
        <i class="fas fa-search search-icon"></i>
        <span class="search-count" id="searchCount"></span>
      </div>
      <div class="filter-wrap">
        <button class="filter-btn" onclick="toggleFilter()" title="筛选作者"><i class="fas fa-filter"></i></button>
        <div class="filter-dropdown" id="filterDropdown"></div>
      </div>
    </div>
  </div>
  <div class="list-body" id="listBody"></div>
</div>

<!-- 名言单页视图 -->
<div class="quote-view" id="quoteView">
  <div class="action-bar">
    <button onclick="showList()" title="返回列表"><i class="fas fa-arrow-left"></i></button>
    <button onclick="exportQuoteImage()" title="导出图片"><i class="fas fa-image"></i></button>
  </div>
  <div class="click-zone left" onclick="prevPage()"></div>
  <div class="click-zone right" onclick="nextPage()"></div>
  <div class="page">
    <div class="quote-mark top-left">“</div>
    <div class="quote-content" id="qContent"></div>
    <div class="quote-author" id="qAuthor"></div>
    <div class="quote-mark bottom-right">”</div>
    <div class="page-jump" id="pageJump">
      <div class="page-number" id="pageNum" onclick="startJump()"></div>
    </div>
  </div>
</div>

<script src="quotes.js"></script>
<script>
let current = 0;
const total = quotes.length + 1;

const listView = document.getElementById('listView');
const quoteView = document.getElementById('quoteView');

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

const pinyinRegex = /([\u4e00-\u9fa5])\(([a-zA-Zāáǎàōóǒòēéěèīíǐìūúǔùǖǘǚǜüńňǹ\s]+?)\)/g;

function tokenizeContent(content) {
  const tokens = [];
  let lastIndex = 0;
  let match;
  pinyinRegex.lastIndex = 0;
  while ((match = pinyinRegex.exec(content)) !== null) {
    if (match.index > lastIndex) {
      for (const char of content.slice(lastIndex, match.index)) {
        tokens.push({ type: 'char', value: char });
      }
    }
    tokens.push({ type: 'ruby', char: match[1], pinyin: match[2] });
    lastIndex = pinyinRegex.lastIndex;
  }
  if (lastIndex < content.length) {
    for (const char of content.slice(lastIndex)) {
      tokens.push({ type: 'char', value: char });
    }
  }
  return tokens;
}

function renderContentWithPinyin(content, query = '', mode = 'list') {
  const tokens = tokenizeContent(content);
  let html = '';
  let i = 0;
  const lowerQuery = query.toLowerCase();
  while (i < tokens.length) {
    if (query) {
      const slice = tokens.slice(i, i + query.length).map(t => t.type === 'ruby' ? t.char : t.value).join('');
      if (slice.toLowerCase() === lowerQuery) {
        const matched = tokens.slice(i, i + query.length).map(t => renderToken(t, mode)).join('');
        html += `<span class="search-highlight">${matched}</span>`;
        i += query.length;
        continue;
      }
    }
    html += renderToken(tokens[i], mode);
    i++;
  }
  return html;
}

function renderToken(t, mode) {
  if (t.type === 'char') return escapeHtml(t.value);
  if (mode === 'quote') {
    return `<ruby>${escapeHtml(t.char)}<rt>${escapeHtml(t.pinyin)}</rt></ruby>`;
  }
  return `<span class="pinyin-tip"><span class="pinyin-base">${escapeHtml(t.char)}</span><span class="pinyin-rt">${escapeHtml(t.pinyin)}</span></span>`;
}

let allItems = [];
let currentFilter = '全部';
let currentSearch = '';

function createList() {
  document.getElementById('totalCount').textContent = quotes.length;
  const listBody = document.getElementById('listBody');
  allItems = [];
  quotes.forEach((q, i) => {
    const item = document.createElement('div');
    item.className = 'list-item';
    item.dataset.author = q.author;
    item.dataset.content = q.content;
    item.dataset.index = i + 1;
    item.onclick = () => showQuote(i + 1);
    const preview = q.content;
    item.innerHTML = `
      <span class="list-item-index">${i + 1}</span>
      <span class="list-item-content">${renderContentWithPinyin(preview, '', 'list')}</span>
      <span class="list-item-author">${escapeHtml(q.author)}</span>
    `;
    listBody.appendChild(item);
    allItems.push(item);
  });
  createFilter();
}

function createFilter() {
  const dropdown = document.getElementById('filterDropdown');
  dropdown.innerHTML = '';
  const authorCounts = {};
  quotes.forEach(q => {
    authorCounts[q.author] = (authorCounts[q.author] || 0) + 1;
  });
  const sortedAuthors = Object.entries(authorCounts)
    .sort((a, b) => b[1] - a[1])
    .map(entry => entry[0]);
  const authors = ['全部', ...sortedAuthors];
  authors.forEach(author => {
    const div = document.createElement('div');
    div.className = 'filter-option' + (author === currentFilter ? ' active' : '');
    const count = author === '全部' ? quotes.length : (authorCounts[author] || 0);
    div.innerHTML = `<span>${escapeHtml(author)}</span><span class="filter-option-count">${count}</span>`;
    div.onclick = (e) => {
      e.stopPropagation();
      applyFilter(author);
    };
    dropdown.appendChild(div);
  });
}

function toggleFilter() {
  const dropdown = document.getElementById('filterDropdown');
  dropdown.classList.toggle('show');
}

function applyFilter(author) {
  currentFilter = author;
  applySearch();
  createFilter();
  toggleFilter();
}

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const lowerText = text.toLowerCase();
  const lowerQuery = query.toLowerCase();
  let result = '';
  let lastIndex = 0;
  let index = lowerText.indexOf(lowerQuery);
  while (index !== -1) {
    result += escapeHtml(text.slice(lastIndex, index));
    result += `<span class="search-highlight">${escapeHtml(text.slice(index, index + query.length))}</span>`;
    lastIndex = index + query.length;
    index = lowerText.indexOf(lowerQuery, lastIndex);
  }
  result += escapeHtml(text.slice(lastIndex));
  return result;
}

function applySearch() {
  const input = document.getElementById('searchInput');
  currentSearch = input ? input.value.trim() : '';
  updateSearchParam(currentSearch);
  let visibleCount = 0;
  allItems.forEach(item => {
    const author = item.dataset.author;
    const content = item.dataset.content;
    const matchesFilter = currentFilter === '全部' || author === currentFilter;
    const matchesSearch = !currentSearch ||
      author.toLowerCase().includes(currentSearch.toLowerCase()) ||
      content.toLowerCase().includes(currentSearch.toLowerCase());
    if (matchesFilter && matchesSearch) {
      item.style.display = 'flex';
      visibleCount++;
      const contentSpan = item.querySelector('.list-item-content');
      const authorSpan = item.querySelector('.list-item-author');
      if (contentSpan) contentSpan.innerHTML = renderContentWithPinyin(content, currentSearch, 'list');
      if (authorSpan) authorSpan.innerHTML = highlightText(author, currentSearch);
    } else {
      item.style.display = 'none';
    }
  });
  const countEl = document.getElementById('searchCount');
  if (countEl) countEl.textContent = currentSearch ? visibleCount : '';
}

function updateSearchParam(search) {
  const url = new URL(location.href);
  if (search) {
    url.searchParams.set('search', search);
  } else {
    url.searchParams.delete('search');
  }
  history.replaceState(null, '', url.pathname + url.search + location.hash);
}

function readSearchParam() {
  const url = new URL(location.href);
  return url.searchParams.get('search') || '';
}

document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.filter-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('filterDropdown').classList.remove('show');
  }
});

function renderQuote(index) {
  const q = quotes[index - 1];
  const contentEl = document.getElementById('qContent');
  const authorEl = document.getElementById('qAuthor');
  const numEl = document.getElementById('pageNum');

  contentEl.style.opacity = '0';
  authorEl.style.opacity = '0';

  setTimeout(() => {
    contentEl.innerHTML = renderContentWithPinyin(q.content, '', 'quote');
    authorEl.innerHTML = escapeHtml(q.author);
    numEl.textContent = index;
    contentEl.style.opacity = '1';
    authorEl.style.opacity = '1';
  }, 150);
}

function showList() {
  listView.style.display = 'flex';
  quoteView.classList.remove('show');
  document.title = '名言';

  history.replaceState(null, '', location.pathname + location.search);
}

function showQuote(index) {
  if (index < 1 || index >= total) return;
  current = index;
  listView.style.display = 'none';
  quoteView.classList.add('show');
  renderQuote(index);
  const q = quotes[index - 1];
  const preview = q.content.length > 20 ? q.content.slice(0, 20) + '...' : q.content;
  document.title = `名言 #${index} — ${q.author}：${preview}`;

  updateHash();
}

function nextPage() {
  if (current < total - 1) showQuote(current + 1);
}

function prevPage() {
  if (current > 1) showQuote(current - 1);
}

function startJump() {
  const container = document.getElementById('pageJump');
  const numEl = document.getElementById('pageNum');
  const val = numEl.textContent;
  container.innerHTML = `<input type="number" id="jumpInput" min="1" max="${quotes.length}" value="${val}" onblur="endJump()" onkeydown="if(event.key==='Enter')endJump()">`;
  const input = document.getElementById('jumpInput');
  input.focus();
  input.select();
}

function endJump() {
  const input = document.getElementById('jumpInput');
  const num = parseInt(input.value, 10);
  const container = document.getElementById('pageJump');
  container.innerHTML = `<div class="page-number" id="pageNum" onclick="startJump()"></div>`;
  document.getElementById('pageNum').textContent = current >= 1 ? current : '';
  if (!isNaN(num) && num >= 1 && num <= quotes.length) {
    showQuote(num);
  }
}

function updateHash() {
  history.replaceState(null, '', location.search + '#page=' + current);
}

function wrapTextForCanvas(ctx, text, maxWidth) {
  const lines = [];
  let currentLine = '';
  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const testLine = currentLine + char;
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && currentLine !== '') {
      lines.push(currentLine);
      currentLine = char;
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) lines.push(currentLine);
  return lines;
}

function parsePinyinUnits(content) {
  const units = [];
  let lastIndex = 0;
  let match;
  pinyinRegex.lastIndex = 0;
  while ((match = pinyinRegex.exec(content)) !== null) {
    if (match.index > lastIndex) {
      for (const char of content.slice(lastIndex, match.index)) {
        units.push({ type: 'text', value: char });
      }
    }
    units.push({ type: 'ruby', char: match[1], pinyin: match[2] });
    lastIndex = pinyinRegex.lastIndex;
  }
  if (lastIndex < content.length) {
    for (const char of content.slice(lastIndex)) {
      units.push({ type: 'text', value: char });
    }
  }
  return units;
}

function measureUnits(ctx, units, fontSize, pinyinFontSize) {
  return units.map(unit => {
    if (unit.type === 'text') {
      ctx.font = `400 ${fontSize}px "STZhongsong", "SimSun", serif`;
      return { ...unit, width: ctx.measureText(unit.value).width };
    }
    ctx.font = `400 ${fontSize}px "STZhongsong", "SimSun", serif`;
    const charWidth = ctx.measureText(unit.char).width;
    ctx.font = `400 ${pinyinFontSize}px "Computer Modern", Cambria, Georgia, serif`;
    const pyWidth = ctx.measureText(unit.pinyin).width;
    return { ...unit, width: Math.max(charWidth, pyWidth) };
  });
}

function wrapUnitsForCanvas(units, maxWidth) {
  const lines = [];
  let currentLine = [];
  let currentWidth = 0;
  for (const unit of units) {
    if (currentWidth + unit.width > maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = [unit];
      currentWidth = unit.width;
    } else {
      currentLine.push(unit);
      currentWidth += unit.width;
    }
  }
  if (currentLine.length) lines.push(currentLine);
  return lines;
}

function calculateBestFontSize(ctx, units, maxWidth, maxHeight) {
  let min = 24;
  let max = 80;
  let best = min;
  while (min <= max) {
    const mid = Math.floor((min + max) / 2);
    const pinyinFontSize = mid * 0.5;
    const measured = measureUnits(ctx, units, mid, pinyinFontSize);
    const lines = wrapUnitsForCanvas(measured, maxWidth);
    const lineHeight = mid * 1.3 + pinyinFontSize;
    const totalHeight = lines.length * lineHeight;
    if (totalHeight <= maxHeight) {
      best = mid;
      min = mid + 1;
    } else {
      max = mid - 1;
    }
  }
  return best;
}

function exportQuoteImage() {
  const q = quotes[current - 1];
  if (!q) return;

  const units = parsePinyinUnits(q.content);

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const width = 1080;
  const height = 1920;
  canvas.width = width;
  canvas.height = height;

  // 背景
  ctx.fillStyle = '#f5f0e8';
  ctx.fillRect(0, 0, width, height);

  // 装饰性引号
  ctx.fillStyle = 'rgba(200, 195, 185, 0.35)';
  ctx.font = '400 300px "STZhongsong", Georgia, serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText('“', 70, 140);
  ctx.fillText('”', width - 200, height - 420);

  // 正文区域
  const paddingX = 110;
  const paddingY = 320;
  const maxWidth = width - paddingX * 2;
  const maxHeight = height - paddingY * 2 - 220;

  const fontSize = calculateBestFontSize(ctx, units, maxWidth, maxHeight);
  const pinyinFontSize = fontSize * 0.5;
  const lineHeight = fontSize * 1.3 + pinyinFontSize;

  const measured = measureUnits(ctx, units, fontSize, pinyinFontSize);
  const lines = wrapUnitsForCanvas(measured, maxWidth);
  const totalHeight = lines.length * lineHeight;
  const startY = (height - totalHeight) / 2;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  lines.forEach((line, lineIndex) => {
    const lineWidth = line.reduce((sum, u) => sum + u.width, 0);
    let x = (width - lineWidth) / 2;
    const pyY = startY + lineIndex * lineHeight;
    const charY = pyY + pinyinFontSize + fontSize * 0.12;

    // 拼音
    ctx.font = `400 ${pinyinFontSize}px "Computer Modern", Cambria, Georgia, serif`;
    ctx.fillStyle = '#888';
    line.forEach(unit => {
      if (unit.type === 'ruby') {
        ctx.fillText(unit.pinyin, x + unit.width / 2, pyY);
      }
      x += unit.width;
    });

    // 汉字
    x = (width - lineWidth) / 2;
    ctx.font = `400 ${fontSize}px "STZhongsong", "SimSun", serif`;
    ctx.fillStyle = '#2c2c2c';
    line.forEach(unit => {
      const text = unit.type === 'text' ? unit.value : unit.char;
      ctx.fillText(text, x + unit.width / 2, charY);
      x += unit.width;
    });
  });

  // 作者
  ctx.font = `italic 400 ${Math.max(32, fontSize * 0.6)}px "STZhongsong", "SimSun", serif`;
  ctx.fillStyle = '#555';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(`—— ${q.author}`, width - paddingX, height - 260);

  // 底部小字
  ctx.font = '400 24px "Computer Modern", Cambria, Georgia, serif';
  ctx.fillStyle = '#999';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`名言 #${current}`, width / 2, height - 80);

  // 黑色梯形页码
  const jumpW = 120;
  const jumpH = 72;
  const jumpX = width - jumpW;
  const jumpY = height - jumpH;
  ctx.fillStyle = '#2c2c2c';
  ctx.beginPath();
  ctx.moveTo(jumpX + jumpW * 0.25, jumpY);
  ctx.lineTo(jumpX + jumpW, jumpY);
  ctx.lineTo(jumpX + jumpW, jumpY + jumpH);
  ctx.lineTo(jumpX, jumpY + jumpH);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#f5f0e8';
  ctx.font = '400 38px "Computer Modern", Cambria, Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(current), jumpX + jumpW * 0.625, jumpY + jumpH / 2);

  // 下载
  const link = document.createElement('a');
  link.download = `名言-${current}-${q.author}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function readHash() {
  const hash = location.hash;
  if (!hash) return 0;
  let num = 0;
  if (hash.startsWith('#page=')) {
    num = parseInt(hash.slice(6), 10);
  } else {
    num = parseInt(hash.slice(1), 10);
  }
  if (!isNaN(num) && num >= 1 && num < total) {
    return num;
  }
  return 0;
}

document.addEventListener('keydown', (e) => {
  if (!quoteView.classList.contains('show')) return;
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

async function getRealSize() {
  try {
    const res = await fetch('STZHONGS.woff2', { headers: { 'Range': 'bytes=0-0' }, cache: 'no-store' });
    if (res.status === 206) {
      const range = res.headers.get('Content-Range'); // bytes 0-0/12582912
      if (range) {
        const m = range.match(/\/(\d+)$/);
        if (m) return parseInt(m[1], 10);
      }
    }
  } catch (e) {}
  return 0;
}

async function loadFontWithProgress() {
  const progressInt = document.getElementById('progressInt');
  const progressDecimal = document.getElementById('progressDecimal');
  const progressRing = document.getElementById('progressRing');
  const radius = progressRing.r.baseVal.value;
  const circumference = 2 * Math.PI * radius;
  progressRing.style.strokeDasharray = `${circumference} ${circumference}`;
  progressRing.style.strokeDashoffset = circumference;

  function setProgress(percent) {
    progressInt.textContent = Math.floor(percent);
    progressDecimal.textContent = (percent % 1).toFixed(2).slice(1) + '%';
    progressRing.style.strokeDashoffset = circumference - (percent / 100) * circumference;
  }
  try {
    let total = await getRealSize();
    const response = await fetch('STZHONGS.woff2');
    if (!total) {
      total = parseInt(response.headers.get('Content-Length') || '0', 10);
    }
    const reader = response.body.getReader();
    const chunks = [];
    let loaded = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;
      if (total) {
        setProgress((loaded / total) * 100);
      }
    }

    const allChunks = new Uint8Array(loaded);
    let pos = 0;
    for (const chunk of chunks) {
      allChunks.set(chunk, pos);
      pos += chunk.length;
    }

    const font = new FontFace('STZhongsong', allChunks.buffer);
    await font.load();
    document.fonts.add(font);
    setProgress(100);
  } catch (err) {
    console.error('字体加载失败', err);
  } finally {
    setTimeout(() => {
      document.getElementById('loadingOverlay').classList.add('hide');
    }, 200);
  }
}

loadFontWithProgress();

createList();

const initialSearch = readSearchParam();
if (initialSearch) {
  const input = document.getElementById('searchInput');
  if (input) input.value = initialSearch;
  applySearch();
}

const initialPage = readHash();
if (initialPage > 0) {
  showQuote(initialPage);
}
</script>
