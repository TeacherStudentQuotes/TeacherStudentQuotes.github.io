<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名言</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f5f0e8;
  font-family: "Noto Serif SC", "SimSun", "宋体", serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.book {
  width: 90vw;
  max-width: 800px;
  height: 85vh;
  position: relative;
  perspective: 1500px;
}

.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #fffef8;
  border-radius: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backface-visibility: hidden;
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
  opacity: 0;
  pointer-events: none;
  transform: translateX(100px) rotateY(-15deg);
}

.page.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(0) rotateY(0deg);
  z-index: 10;
}

.page.prev {
  opacity: 0;
  transform: translateX(-100px) rotateY(15deg);
  z-index: 5;
}

/* 封面 */
.cover {
  background: #2c2c2c;
  color: #f5f0e8;
}

.cover h1 {
  font-size: 6rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-align: center;
}

.cover .subtitle {
  margin-top: 20px;
  font-size: 1.2rem;
  letter-spacing: 0.2em;
  opacity: 0.7;
}

/* 名言页 */
.quote-mark {
  position: absolute;
  font-size: 8rem;
  color: #ddd;
  font-family: Georgia, serif;
  line-height: 1;
  user-select: none;
}

.quote-mark.top-left {
  top: 30px;
  left: 40px;
}

.quote-mark.bottom-right {
  bottom: 30px;
  right: 40px;
}

.quote-content {
  font-size: 1.8rem;
  line-height: 2;
  text-align: center;
  color: #333;
  max-width: 90%;
  z-index: 2;
}

.quote-author {
  position: absolute;
  bottom: 80px;
  right: 80px;
  font-size: 1.3rem;
  color: #666;
  font-style: italic;
}

.quote-author::before {
  content: "—— ";
}

.page-number {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 60px;
  height: 36px;
  background: #2c2c2c;
  color: #f5f0e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-family: Georgia, serif;
  clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  box-shadow: -2px -2px 8px rgba(0,0,0,0.15);
}

/* 导航提示 */
.hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #999;
  font-size: 0.9rem;
  opacity: 0.6;
  pointer-events: none;
}

/* 左右点击区域 */
.click-zone {
  position: fixed;
  top: 0;
  width: 30%;
  height: 100%;
  cursor: pointer;
  z-index: 100;
}

.click-zone.left { left: 0; }
.click-zone.right { right: 0; }



/* 移动端适配 */
@media (max-width: 600px) {
  .page { padding: 40px 30px; }
  .cover h1 { font-size: 3.5rem; }
  .quote-content { font-size: 1.3rem; line-height: 1.8; }
  .quote-author { font-size: 1rem; bottom: 60px; right: 50px; }
  .quote-mark { font-size: 5rem; }
  .quote-mark.top-left { top: 20px; left: 20px; }
  .quote-mark.bottom-right { bottom: 20px; right: 20px; }
}
</style>
</head>
<body>

<div class="book" id="book"></div>

<div class="click-zone left" onclick="prevPage()"></div>
<div class="click-zone right" onclick="nextPage()"></div>

<div class="hint">点击左右翻页，或使用键盘 ← → 方向键</div>

<script src="quotes.js"></script>
<script>
let current = 0;
const total = quotes.length + 1; // 包含封面

function createPages() {
  const book = document.getElementById('book');

  // 封面
  const cover = document.createElement('div');
  cover.className = 'page cover active';
  cover.innerHTML = `<h1>名言</h1><div class="subtitle">—— 师生语录精选</div>`;
  book.appendChild(cover);

  // 名言页
  quotes.forEach((q, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.innerHTML = `
      <div class="quote-mark top-left">“</div>
      <div class="quote-content">${escapeHtml(q.content)}</div>
      <div class="quote-author">${escapeHtml(q.author)}</div>
      <div class="quote-mark bottom-right">”</div>
      <div class="page-number">${i + 1}</div>
    `;
    book.appendChild(page);
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showPage(index) {
  if (index < 0 || index >= total) return;
  const pages = document.querySelectorAll('.page');
  pages.forEach((p, i) => {
    p.classList.remove('active', 'prev');
    if (i === index) {
      p.classList.add('active');
    } else if (i < index) {
      p.classList.add('prev');
    }
  });
  current = index;
}

function nextPage() {
  if (current < total - 1) showPage(current + 1);
}

function prevPage() {
  if (current > 0) showPage(current - 1);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

createPages();
</script>
</body>
</html>
