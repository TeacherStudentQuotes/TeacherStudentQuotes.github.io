<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta id="ogDesc" property="og:description" content="师生语录精选，共144条名言">
<meta id="metaDesc" name="description" content="师生语录精选，共144条名言">
<title>名言</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
}

body {
  background: #f5f0e8;
  font-family: "Noto Serif SC", "SimSun", "宋体", serif;
  overflow: hidden;
}

.book {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.page {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #fffef8;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.page.cover {
  background: #2c2c2c;
  color: #f5f0e8;
}

.cover h1 {
  font-size: 6rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-align: center;
}

.cover .subtitle {
  margin-top: 20px;
  font-size: 1.2rem;
  letter-spacing: 0.2em;
  opacity: 0.7;
}

.quote-mark {
  position: absolute;
  font-size: 8rem;
  color: #ddd;
  font-family: Georgia, serif;
  line-height: 1;
  user-select: none;
}

.quote-mark.top-left {
  top: 30px;
  left: 40px;
}

.quote-mark.bottom-right {
  bottom: 30px;
  right: 40px;
}

.quote-content {
  font-size: 1.8rem;
  line-height: 2;
  text-align: center;
  color: #333;
  max-width: 90%;
  z-index: 2;
  transition: opacity 0.3s ease;
}

.quote-author {
  position: absolute;
  bottom: 80px;
  right: 80px;
  font-size: 1.3rem;
  color: #666;
  font-style: italic;
  transition: opacity 0.3s ease;
}

.quote-author::before {
  content: "—— ";
}

.page-jump {
  position: absolute;
  bottom: 0;
  right: 0;
  z-index: 20;
}

.page-jump .page-number {
  width: 60px;
  height: 36px;
  background: #2c2c2c;
  color: #f5f0e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-family: Georgia, serif;
  clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  cursor: pointer;
  user-select: none;
}

.page-jump input {
  width: 60px;
  height: 36px;
  background: #2c2c2c;
  color: #f5f0e8;
  border: none;
  text-align: center;
  font-size: 0.9rem;
  font-family: Georgia, serif;
  clip-path: polygon(25% 0%, 100% 0%, 100% 100%, 0% 100%);
  outline: none;
}

.page-jump input::placeholder {
  color: #999;
}

.click-zone {
  position: fixed;
  top: 0;
  width: 30%;
  height: 100%;
  cursor: pointer;
  z-index: 100;
}

.click-zone.left { left: 0; }
.click-zone.right { right: 0; }

.hint {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #999;
  font-size: 0.9rem;
  opacity: 0.6;
  pointer-events: none;
}

@media (max-width: 600px) {
  .page { padding: 40px 30px; }
  .cover h1 { font-size: 3.5rem; }
  .quote-content { font-size: 1.3rem; line-height: 1.8; }
  .quote-author { font-size: 1rem; bottom: 60px; right: 50px; }
  .quote-mark { font-size: 5rem; }
  .quote-mark.top-left { top: 20px; left: 20px; }
  .quote-mark.bottom-right { bottom: 20px; right: 20px; }
}
</style>
</head>
<body>

<div class="book" id="book"></div>

<div class="click-zone left" onclick="prevPage()"></div>
<div class="click-zone right" onclick="nextPage()"></div>

<div class="hint">点击左右翻页，或使用键盘 ← → 方向键</div>

<script src="quotes.js"></script>
<script>
let current = 0;
const total = quotes.length + 1;

const book = document.getElementById('book');

const coverPage = document.createElement('div');
coverPage.className = 'page cover';
coverPage.innerHTML = `<h1>名言</h1><div class="subtitle">—— 师生语录精选</div>`;
book.appendChild(coverPage);

const quotePage = document.createElement('div');
quotePage.className = 'page';
quotePage.style.opacity = '0';
quotePage.style.pointerEvents = 'none';
quotePage.innerHTML = `
  <div class="quote-mark top-left">\u201c</div>
  <div class="quote-content" id="qContent"></div>
  <div class="quote-author" id="qAuthor"></div>
  <div class="quote-mark bottom-right">\u201d</div>
  <div class="page-jump" id="pageJump">
    <div class="page-number" id="pageNum" onclick="startJump()"></div>
  </div>
`;
book.appendChild(quotePage);

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderQuote(index) {
  const q = quotes[index - 1];
  const contentEl = document.getElementById('qContent');
  const authorEl = document.getElementById('qAuthor');
  const numEl = document.getElementById('pageNum');

  contentEl.style.opacity = '0';
  authorEl.style.opacity = '0';

  setTimeout(() => {
    contentEl.innerHTML = escapeHtml(q.content);
    authorEl.innerHTML = escapeHtml(q.author);
    numEl.textContent = index;
    contentEl.style.opacity = '1';
    authorEl.style.opacity = '1';
  }, 150);
}

function showPage(index) {
  if (index < 0 || index >= total) return;
  current = index;

  if (index === 0) {
    coverPage.style.opacity = '1';
    coverPage.style.pointerEvents = 'all';
    quotePage.style.opacity = '0';
    quotePage.style.pointerEvents = 'none';
    document.title = '名言';
    document.getElementById('ogDesc').setAttribute('content', '师生语录精选，共144条名言');
    document.getElementById('metaDesc').setAttribute('content', '师生语录精选，共144条名言');
  } else {
    coverPage.style.opacity = '0';
    coverPage.style.pointerEvents = 'none';
    quotePage.style.opacity = '1';
    quotePage.style.pointerEvents = 'all';
    renderQuote(index);
    const q = quotes[index - 1];
    const preview = q.content.length > 20 ? q.content.slice(0, 20) + '...' : q.content;
    document.title = `名言 #${index} — ${q.author}：${preview}`;
    document.getElementById('ogDesc').setAttribute('content', `${q.author}：${q.content}`);
    document.getElementById('metaDesc').setAttribute('content', `${q.author}：${q.content}`);
  }

  updateHash();
}

function nextPage() {
  if (current < total - 1) showPage(current + 1);
}

function prevPage() {
  if (current > 0) showPage(current - 1);
}

function startJump() {
  const container = document.getElementById('pageJump');
  const numEl = document.getElementById('pageNum');
  const val = numEl.textContent;
  container.innerHTML = `<input type="number" id="jumpInput" min="1" max="${quotes.length}" value="${val}" onblur="endJump()" onkeydown="if(event.key==='Enter')endJump()">`;
  const input = document.getElementById('jumpInput');
  input.focus();
  input.select();
}

function endJump() {
  const input = document.getElementById('jumpInput');
  const num = parseInt(input.value, 10);
  const container = document.getElementById('pageJump');
  container.innerHTML = `<div class="page-number" id="pageNum" onclick="startJump()"></div>`;
  document.getElementById('pageNum').textContent = current >= 1 ? current : '';
  if (!isNaN(num) && num >= 1 && num <= quotes.length) {
    showPage(num);
  }
}

function updateHash() {
  if (current === 0) {
    history.replaceState(null, '', location.pathname + location.search);
  } else {
    history.replaceState(null, '', '#page=' + current);
  }
}

function readHash() {
  const hash = location.hash;
  if (!hash) return 0;
  let num = 0;
  if (hash.startsWith('#page=')) {
    num = parseInt(hash.slice(6), 10);
  } else {
    num = parseInt(hash.slice(1), 10);
  }
  if (!isNaN(num) && num >= 1 && num < total) {
    return num;
  }
  return 0;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
});

showPage(0);

const initialPage = readHash();
if (initialPage > 0) {
  showPage(initialPage);
}
</script>
</body>
</html>
